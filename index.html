<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini 3D Marketplace</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

header {
  text-align:center;
  padding:20px;
  border-bottom:1px solid #222;
}

h1 {
  color:#4f8cff;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
  padding:20px;
}

/* CARD */
.card {
  background:#111;
  border-radius:15px;
  padding:10px;
  cursor:pointer;
  transition:0.3s;
  border:1px solid #222;
}

.card:hover {
  transform:scale(1.03);
  border-color:#4f8cff;
}

/* 3D preview */
model-viewer {
  width:100%;
  height:200px;
  background:#000;
  border-radius:10px;
}

.price {
  color:#4f8cff;
}
</style>
</head>

<body>

<header>
<h1>🧊 3D Marketplace (Mini CGTrader)</h1>
</header>

<div class="grid" id="grid"></div>

<script src="data.js"></script>

<script>

const grid = document.getElementById("grid");

models.forEach(m => {

  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <model-viewer src="${m.file}" auto-rotate camera-controls></model-viewer>
    <h3>${m.name}</h3>
    <p class="price">$${m.price}</p>
    <p>Seller: ${m.seller}</p>
  `;

  div.onclick = () => {
    window.location.href = "model.html?id=" + m.id;
  };

  grid.appendChild(div);

});

</script>

</body>
</html>
