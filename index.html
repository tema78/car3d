<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>car3d Showroom</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
  overflow:hidden;
}

/* INTRO */
#intro {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle, #1a1a1a, #000);
  transition:1s;
}

h1 {
  color:#ffd000;
  font-size:50px;
}

button {
  margin-top:20px;
  padding:15px 30px;
  border:none;
  border-radius:12px;
  background:#ffd000;
  cursor:pointer;
  font-weight:bold;
}

/* 🚗 STORE */
#store {
  display:none;
  background:#0a0a0a;
  min-height:100vh;
  padding:20px;
  overflow:auto;
}

header {
  text-align:center;
  color:#ffd000;
  margin-bottom:20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

/* CARD */
.card {
  background:#111;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
  border:1px solid #222;
}

.card:hover {
  transform:scale(1.05);
  border-color:#ffd000;
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.info {
  padding:10px;
}

.price {
  color:#ffd000;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>🚗 car3d SHOWROOM</h1>
  <button onclick="enter()">ENTER SHOWROOM</button>
</div>

<!-- STORE -->
<div id="store">

<header>
  <h1>Premium Car Catalog</h1>
</header>

<div class="grid" id="grid"></div>

</div>

<script src="data.js"></script>

<script>

function enter(){
  document.getElementById("intro").style.display="none";
  document.getElementById("store").style.display="block";
}

/* RENDER CARS */
const grid=document.getElementById("grid");

cars.forEach(c=>{
  let div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <img src="${c.image}">
    <div class="info">
      <h3>${c.name}</h3>
      <p class="price">$${c.price}</p>
    </div>
  `;

  div.onclick=()=>{
    window.location.href="car.html?id="+c.id;
  };

  grid.appendChild(div);
});

</script>

</body>
</html>
